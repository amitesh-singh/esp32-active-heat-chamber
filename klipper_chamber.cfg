# klipper_chamber.cfg
# Heater chamber control via gcode_shell_command → ESP32 REST API
#
# Prerequisites:
#   1. Install gcode_shell_command plugin:
#      cd ~/klipper
#      wget -O ~/klipper/klippy/extras/gcode_shell_command.py \
#        https://raw.githubusercontent.com/th33xitus/kiauh/master/resources/gcode_shell_command.py
#
#   2. Install and configure the shell script:
#      sudo cp chamber_control.sh /usr/local/bin/chamber_control.sh
#      sudo chmod +x /usr/local/bin/chamber_control.sh
#      # Edit ESP32_IP in the script to match your ESP32's IP
#
#   3. Include this file in printer.cfg:
#      [include klipper_chamber.cfg]
#
# Usage in GCode / macros:
#   CHAMBER_ON TEMP=60
#   CHAMBER_OFF
#   CHAMBER_TEMP TARGET=65
#   CHAMBER_FAN SPEED=180
#   CHAMBER_STATUS
#   CHAMBER_WAIT TEMP=58        ; blocks until chamber reaches temp


# ── Shell command definitions ─────────────────────────────────────────────────

[gcode_shell_command chamber_heater_on]
command: /usr/local/bin/chamber_control.sh heater on
timeout: 8
verbose: True

[gcode_shell_command chamber_heater_off]
command: /usr/local/bin/chamber_control.sh heater off
timeout: 8
verbose: True

[gcode_shell_command chamber_set_temp]
command: /usr/local/bin/chamber_control.sh temp
timeout: 8
verbose: True

[gcode_shell_command chamber_set_fan]
command: /usr/local/bin/chamber_control.sh fan
timeout: 8
verbose: True

[gcode_shell_command chamber_get_status]
command: /usr/local/bin/chamber_control.sh status
timeout: 8
verbose: True


# ── GCode Macros ──────────────────────────────────────────────────────────────

# CHAMBER_ON TEMP=60
# Turn heater on and set target temperature (default 60°C)
[gcode_macro CHAMBER_ON]
description: Turn on heater chamber and set target temperature
gcode:
    {% set target = params.TEMP|default(60)|float %}
    M118 Chamber: setting target to {target}C
    RUN_SHELL_COMMAND CMD=chamber_set_temp PARAMS="{target}"
    RUN_SHELL_COMMAND CMD=chamber_heater_on
    M118 Chamber: heater ON, target={target}C


# CHAMBER_OFF
# Turn off heater and fan
[gcode_macro CHAMBER_OFF]
description: Turn off heater chamber
gcode:
    M118 Chamber: turning off
    RUN_SHELL_COMMAND CMD=chamber_heater_off
    M118 Chamber: heater OFF


# CHAMBER_TEMP TARGET=65
# Update setpoint without toggling heater state
[gcode_macro CHAMBER_TEMP]
description: Set chamber target temperature
gcode:
    {% set target = params.TARGET|default(60)|float %}
    M118 Chamber: setpoint → {target}C
    RUN_SHELL_COMMAND CMD=chamber_set_temp PARAMS="{target}"


# CHAMBER_FAN SPEED=180
# Manually override fan speed (0-255). Heater auto-fan resumes on next PID cycle.
[gcode_macro CHAMBER_FAN]
description: Set chamber fan speed (0-255)
gcode:
    {% set speed = params.SPEED|default(128)|int %}
    M118 Chamber: fan → {speed}
    RUN_SHELL_COMMAND CMD=chamber_set_fan PARAMS="{speed}"


# CHAMBER_STATUS
# Print current chamber state to console
[gcode_macro CHAMBER_STATUS]
description: Query chamber temperature and state
gcode:
    M118 Chamber: querying status...
    RUN_SHELL_COMMAND CMD=chamber_get_status


# CHAMBER_WAIT TEMP=58
# Poll chamber until temperature reaches target (blocking, with timeout)
# Call BEFORE starting a print that needs a warm chamber.
[gcode_macro CHAMBER_WAIT]
description: Wait for chamber to reach target temperature
variable_poll_interval: 10    ; seconds between status checks
variable_max_wait: 1200       ; max wait time in seconds (20 min)
gcode:
    {% set target = params.TEMP|default(55)|float %}
    {% set tolerance = params.TOLERANCE|default(2)|float %}
    M118 Chamber: waiting for {target}C (±{tolerance}C)...
    RUN_SHELL_COMMAND CMD=chamber_set_temp PARAMS="{target}"
    RUN_SHELL_COMMAND CMD=chamber_heater_on

    # Klipper's TEMPERATURE_WAIT can't query external sensors directly,
    # so we use a timed loop with shell status checks.
    # For a cleaner approach, expose the ESP32 temp as a dummy sensor (see note below).
    {% set ns = namespace(elapsed=0, done=false) %}
    {% for i in range((max_wait // poll_interval)|int) %}
        {% if not ns.done %}
            G4 P{poll_interval * 1000}
            RUN_SHELL_COMMAND CMD=chamber_get_status
            M118 Chamber: waiting... ({(i+1)*poll_interval}s elapsed)
        {% endif %}
    {% endfor %}
    M118 Chamber: wait complete (or timed out after {max_wait}s)

# ── Print start / end integration ─────────────────────────────────────────────
# Add these calls to your existing START_PRINT / END_PRINT macros:
#
# [gcode_macro START_PRINT]
# gcode:
#     ...
#     CHAMBER_ON TEMP=60          # start heating
#     CHAMBER_WAIT TEMP=58        # wait before printing (optional)
#     ...
#
# [gcode_macro END_PRINT]
# gcode:
#     ...
#     CHAMBER_OFF                 # cut heater when done
#     ...
#
# ── Expose ESP32 temp as a Klipper sensor (optional but recommended) ──────────
# This lets TEMPERATURE_WAIT and the Mainsail/Fluidd dashboard see chamber temp.
# Requires a small Python sensor plugin or moonraker data_store — see:
# https://www.klipper3d.org/Config_Reference.html#temperature_sensor
#
# [temperature_sensor chamber]
# sensor_type: temperature_host   # placeholder; replace with custom plugin
